name: Deploy Doxygen to GitHub Pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz libgsl-dev libgtest-dev libbenchmark-dev

      - name: Install Python Data Packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Build sample generator
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target generate_samples -j

      - name: Generate sample plots
        env:
          GSL_RNG_SEED: "42"
        run: |
          python plots/plot_samples.py --generator build/plots/generate_samples --out-dir doxygen/images

      - name: Build docs
        run: |
          mkdir -p doxygen/html
          doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./doxygen/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
